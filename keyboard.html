<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       body{
        background-color: #1e7c85;
        place-items: center;
        margin-top: 100px;
        height: 400px ;
        width:950px;
        border:3px solid black;
        margin-left: 150px;
        border-radius: 10px;
        box-shadow: 0 0 20px  rgb(23, 23, 207);
       }
       #key{
        height:350px;
        width:900px;
        margin:0 auto;
        border:3px solid black;
        border-radius: 10px;
        background-color: black;
        box-shadow: 0 0 20px royalblue; ;
        
       }
        #key1{
        display:flex;
        margin-left: 5px;
        gap:10px;
        padding: 5px;
        cursor: pointer;
       } 
       #board{
        display: flex;
        margin-left: 10px;
        gap:10px;
       }
       button{
        width:50px;
        height:50px;
       }
       .bs{
        width:80px;
        height:50px
       }
       #board5{
        display: flex;
        margin-left: 5px;
        gap:10px;
        padding: 5px;
       }
       #board1{
        display: flex;
        margin-left: 5px;
        gap:10px;
        padding: 5px;
       }
       #board2{
        display: flex;
        margin-left: 5px;
        gap:10px;
        padding: 5px;
       }
       .bs1{
        width:150px;
        height:50px
       }
       .bs2{
        width:150px;
        height:50px
       }
       .bs3{
        width:150px;
        height:50px
       }
        #board3{
        display: flex;
        margin-left: 5px;
        gap:10px;
        padding: 3px;
       }
       .pg{
         display: grid;
         grid-template-columns:  repeat(3, 60px);
         grid-template-rows:repeat(2, 30px);
        
       }
      .pg1{
        height: 20px;
      }
      .pg2{
        height: 23px;
      }
      button{
        border:2px solid black;
        border-radius: 5px;
        cursor: pointer;
        background-color: aquamarine;
      }
      button:hover{
        background-color:color-mix(in srgb, #17173e 50%, rgb(101, 29, 29) 50%);
          color: #370d3f;
      }
    </style>
</head>
<body>
    <input type="text" id="display">
    <div id="key">
         <div id="key1">
        <button class="big">esc</button>
        <button>🔇</button>
        <button>🔉</button>
        <button>🔊</button>
        <button>⏯️</button>
        <button>f5</button>
        <button>🔅</button>
        <button>🔆</button>
        <button>📺</button>
        <button>f9</button>
         <button>prt sc</button>
         <button>home</button>
        <button>end</button>
        <button>insert</button>
        <button>delete</button>
        <button>⏻</button>
    </div>
    <div id="board">
        <button class="big">~</button>
        <button>! 2</button>
        <button>@</button>
        <button>#</button>
        <button>$</button>
        <button>%</button>
        <button>^</button>
        <button>&</button>
        <button>*</button>
        <button>(</button>
         <button>)</button>
         <button>-</button>
        <button>+</button>
        <button class="bs">backspace</button>
    </div>

    
     <div id="board5">
        <button class="bs">tab</button>
        <button>Q</button>
        <button>W</button>
        <button>E</button>
        <button>R</button>
        <button>T</button>
        <button>Y</button>
        <button>U</button>
        <button>I</button>
         <button>O</button>
        <button>P</button>
        <button>{</button>
        <button>}</button>
        <button>|</button>
    </div> 

     <div id="board1">
        <button class="bs1">caps lock</button>
        <button>A</button>
        <button>S</button>
        <button>D</button>
        <button>F</button>
        <button>G</button>
        <button>H</button>
        <button>J</button>
        <button>K</button>
        <button>L</button>
         <button>: ;</button>
        <button>' "</button>
        <button class="bs1">enter</button>
    </div>  

      <div id="board2">
        <button class="bs2">shift</button>
        <button>Z</button>
        <button>X</button>
        <button>C</button>
        <button>V</button>
        <button>B</button>
        <button>N</button>
        <button>M</button>
        <button>< ,</button>
        <button>> .</button>
         <button>? /</button>
          <button class="bs3">shift</button>
    </div> 
      <div id="board3">
        <button>ctrl</button>
        <button>fn</button>
        <button>🪟</button>
        <button>alt</button>
        <button style="width:350px"></button>
        <button>alt</button>
         <button>ctrl</button>
         <div class="pg">
         <button class="pg2">pg up</button>
         <button class="pg2">🔼</button>
         <button class="pg2">pg dn</button>
         <button class="pg1"><</button>
         <button class="pg1">🔽</button>
         <button class="pg1">></button>
         </div>
    </div> 
</div>
<script>
  const con=document.querySelectorAll("button");
  const prgh=document.getElementById("display")
  con.forEach(function(buttons)
  {
         buttons.addEventListener("click",function(){
          prgh.value+=buttons.innerText;
              
  });
  });
</script>
</body>
</html>
