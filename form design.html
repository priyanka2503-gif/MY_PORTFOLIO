<html>
    <head>
        <title>form design</title>
    </head>
    <body style="text-align: center">
        <h1>REGISTRATION</h1>
        <form>
            <label>First name:</label>
            <input type="text" placeholder="User Name"><br><br>
            <label>last name:</label>
            <input type="text" placeholder="text"><br><br>
            <label>Email:</label>
            <input type="Email" placeholder="Email"><br><br>
            <label>Password:</label>
            <input type="Password" placeholder="Password"><hr><br>
            <label>Address:</label>
            <input type="text" placeholder="address"><br><br>
            <label>postal:</label>
            <input type="text"><br><br>
            <label>city:</label>
            <input type="text" placeholder="city"><br><br>
            <label>country:</label>
            <select>
                <option>india</option>
                <option>korea</option>
                <option>china</option>
                <option>sreelanka</option>
                <option>indonesia</option>
                <option>vietnam</option>
                <option>america</option>
            </select><hr><br>
            <label>Account type:</label>
            <input type="radio">Basic(Free registration)<br>
            <input type="radio">Pro 9.995<br>
            <input type="radio">Expert 19.995<br><br>
            <label>Some description:</label>
            <textarea row="10" col="5"></textarea><br><br>
            <button>do some actions</button>
    </body>
</html>
